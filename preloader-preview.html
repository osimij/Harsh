    <p class="hint">A thin pen traces each subpath in path order; the filled logo blooms in alongside the strokes so the final state is the solid mark.</p>

    <script>
        const shape = document.getElementById('preview-shape');
        const strokeGroup = document.getElementById('preview-stroke-group');
        const fillEl = document.getElementById('preview-fill');
        const playBtn = document.getElementById('play-btn');
        const durationInput = document.getElementById('duration');
        const durationReadout = document.getElementById('duration-readout');
        const scrubInput = document.getElementById('scrub');
        const scrubReadout = document.getElementById('scrub-readout');

        const SVG_NS = 'http://www.w3.org/2000/svg';
        const fullD = shape.getAttribute('d');
        const subDs = fullD.match(/M[^M]+/g) || [fullD];

        const subpaths = subDs.map((d) => {
            const p = document.createElementNS(SVG_NS, 'path');
            p.setAttribute('d', d.trim());
            strokeGroup.appendChild(p);
            return { el: p, len: 0, start: 0, end: 0 };
        });

        let totalLen = 0;
        subpaths.forEach((sp) => {
            sp.len = sp.el.getTotalLength();
            sp.el.style.strokeDasharray = String(sp.len);
            sp.el.style.strokeDashoffset = String(sp.len);
            totalLen += sp.len;
        });

        // Each subpath gets a window proportional to its length, with overlap so
        // the pen seems to flow continuously between subpaths.
        const overlap = 0.35;
        let cursor = 0;
        subpaths.forEach((sp) => {
            const dur = sp.len / totalLen;
            sp.start = cursor;
            sp.end = cursor + dur;
            cursor = sp.end - dur * overlap;
        });
        const span = subpaths[subpaths.length - 1].end;
        subpaths.forEach((sp) => {
            sp.start /= span;
            sp.end /= span;
        });

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }
        function easeOutQuad(t) {
            return 1 - (1 - t) * (1 - t);
        }

        function setProgress(pct) {
            const p = Math.max(0, Math.min(100, pct));
            const t = p / 100;
            // Per-subpath drawing in path order. Each gets eased.
            for (const sp of subpaths) {
                let local;
                if (t <= sp.start) local = 0;
                else if (t >= sp.end) local = 1;
                else local = (t - sp.start) / (sp.end - sp.start);
                const eased = easeInOutCubic(local);
                sp.el.style.strokeDashoffset = String(sp.len * (1 - eased));
            }
            // Fill bleeds in over the second half of the timeline so by the end
            // the strokes fade into a solid filled logo.
            const fillStart = 0.55;
            let fillOpacity = 0;
            if (t > fillStart) {
                fillOpacity = easeOutQuad((t - fillStart) / (1 - fillStart));
            }
            fillEl.setAttribute('opacity', String(fillOpacity));
            scrubInput.value = String(p);
            scrubReadout.textContent = p.toFixed(0) + '%';
        }

        let playing = true;
        let rafId = null;
        let loopStart = performance.now();
        let duration = Number(durationInput.value);

        function tick(now) {
            if (!playing) return;
            const cycle = duration + 900;
            const elapsed = (now - loopStart) % cycle;
            let pct;
            if (elapsed < duration) {
                pct = (elapsed / duration) * 100;
            } else {
                pct = 100;
            }
            setProgress(pct);
            rafId = requestAnimationFrame(tick);
        }

        function startLoop() {
            playing = true;
            playBtn.textContent = 'Pause loop';
            playBtn.classList.add('active');
            loopStart = performance.now();
            rafId = requestAnimationFrame(tick);
        }
        function stopLoop() {
            playing = false;
            playBtn.textContent = 'Resume loop';
            playBtn.classList.remove('active');
            if (rafId) cancelAnimationFrame(rafId);
        }

        playBtn.addEventListener('click', () => {
            if (playing) stopLoop();
            else startLoop();
        });
        durationInput.addEventListener('input', () => {
            duration = Number(durationInput.value);
            durationReadout.textContent = (duration / 1000).toFixed(1) + 's';
            loopStart = performance.now();
        });
        scrubInput.addEventListener('input', () => {
            stopLoop();
            setProgress(Number(scrubInput.value));
        });

        setProgress(0);
        startLoop();
    </script>
